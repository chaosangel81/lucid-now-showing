# Dependabot configuration
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/server/"
    labels:
      - "pr: dependency-update"
    schedule:
      interval: weekly
      time: "06:00"
    open-pull-requests-limit: 10
  - package-ecosystem: "docker"
    directory: "/"
    labels:
      - "pr: dependency-update"
    schedule:
      interval: weekly
      time: "06:00"
    open-pull-requests-limit: 10
